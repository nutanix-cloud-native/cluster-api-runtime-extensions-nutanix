iption":"AssignmentMode determines if IP addresses from this pool should be  assigned automatically or on request only","type":"string"},"blockSize":{"description":"BlockSize specifies the CIDR prefex length to use when allocating per-node IP blocks from\nthe main IP pool CIDR.\nDefault: 26 (IPv4), 122 (IPv6)","format":"int32","type":"integer"},"cidr":{"description":"CIDR contains the address range for the IP Pool in classless inter-domain routing format.","type":"string"},"disableBGPExport":{"default":false,"description":"DisableBGPExport specifies whether routes from this IP pool's CIDR are exported over BGP.\nDefault: false","type":"boolean"},"disableNewAllocations":{"description":"DisableNewAllocations specifies whether or not new IP allocations are allowed from this pool.\nThis is useful when you want to prevent new pods from receiving IP addresses from this pool, without\nimpacting any existing pods that have already been assigned addresses from this pool.","type":"boolean"},"encapsulation":{"description":"Encapsulation specifies the encapsulation type that will be used with\nthe IP Pool.\nDefault: IPIP","enum":["IPIPCrossSubnet","IPIP","VXLAN","VXLANCrossSubnet","None"],"type":"string"},"name":{"description":"Name is the name of the IP pool. If omitted, this will be generated.","type":"string"},"natOutgoing":{"description":"NATOutgoing specifies if NAT will be enabled or disabled for outgoing traffic.\nDefault: Enabled","enum":["Enabled","Disabled"],"type":"string"},"nodeSelector":{"description":"NodeSelector specifies the node selector that will be set for the IP Pool.\nDefault: 'all()'","type":"string"}},"required":["cidr"],"type":"object"},"maxItems":25,"type":"array"},"kubeProxyManagement":{"description":"KubeProxyManagement controls whether the operator manages the kube-proxy DaemonSet.\nWhen enabled, the operator will manage the DaemonSet by patching it:\nit disables kube-proxy if the dataplane is BPF, or enables it otherwise.\nDefault: Disabled","enum"
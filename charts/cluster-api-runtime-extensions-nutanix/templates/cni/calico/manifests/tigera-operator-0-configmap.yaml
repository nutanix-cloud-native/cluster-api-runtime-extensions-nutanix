ist of API server init containers.\nIf specified, this overrides the specified API server Deployment init containers.\nIf omitted, the API server Deployment will use its default values for its init containers.","items":{"description":"APIServerDeploymentInitContainer is an API server Deployment init container.","properties":{"name":{"description":"Name is an enum which identifies the API server Deployment init container by name.\nSupported values are: calico-apiserver-certs-key-cert-provisioner","enum":["calico-apiserver-certs-key-cert-provisioner"],"type":"string"},"resources":{"description":"Resources allows customization of limits and requests for compute resources such as cpu and memory.\nIf specified, this overrides the named API server Deployment init container's resources.\nIf omitted, the API server Deployment will use its default value for this init container's resources.","properties":{"claims":{"description":"Claims lists the names of resources, defined in spec.resourceClaims,\nthat are used by this container.\nThis is an alpha field and requires enabling the\nDynamicResourceAllocation feature gate.\nThis field is immutable. It can only be set for containers.","items":{"description":"ResourceClaim references one entry in PodSpec.ResourceClaims.","properties":{"name":{"description":"Name must match the name of one entry in pod.spec.resourceClaims of\nthe Pod where this field is used. It makes that resource available\ninside a container.","type":"string"},"request":{"description":"Request is the name chosen for a request in the referenced claim.\nIf empty, everything from the claim is made available, otherwise\nonly the result of this request.","type":"string"}},"required":["name"],"type":"object"},"type":"array","x-kubernetes-list-map-keys":["name"],"x-kubernetes-list-type":"map"},"limits":{"additionalProperties":{"anyOf":[{"type":"integer"},{"type":"string"}],"pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-
type":"object"}},"type":"object"},"fipsMode":{"description":"FIPSMode uses images and features only that are using FIPS 140-2 validated cryptographic modules and standards.\nOnly supported for Variant=Calico.\nDefault: Disabled","enum":["Enabled","Disabled"],"type":"string"},"flexVolumePath":{"description":"FlexVolumePath optionally specifies a custom path for FlexVolume. If not specified, FlexVolume will be\nenabled by default. If set to 'None', FlexVolume will be disabled. The default is based on the\nkubernetesProvider.","type":"string"},"imagePath":{"description":"ImagePath allows for the path part of an image to be specified. If specified\nthen the specified value will be used as the image path for each image. If not specified\nor empty, the default for each image will be used.\nA special case value, UseDefault, is supported to explicitly specify the default\nimage path will be used for each image.\nImage format:\n   `<registry><imagePath>/<imagePrefix><imageName>:<image-tag>`\nThis option allows configuring the `<imagePath>` portion of the above format.","type":"string"},"imagePrefix":{"description":"ImagePrefix allows for the prefix part of an image to be specified. If specified\nthen the given value will be used as a prefix on each image. If not specified\nor empty, no prefix will be used.\nA special case value, UseDefault, is supported to explicitly specify the default\nimage prefix will be used for each image.\nImage format:\n   `<registry><imagePath>/<imagePrefix><imageName>:<image-tag>`\nThis option allows configuring the `<imagePrefix>` portion of the above format.","type":"string"},"imagePullSecrets":{"description":"ImagePullSecrets is an array of references to container registry pull secrets to use. These are\napplied to all images to be pulled.","items":{"description":"LocalObjectReference contains enough information to let you locate the\nreferenced object inside the same namespace.","properties":{"name":{"default":"","description":"Name of the referent.\nThis field is effectively required, but due to backwards compatibility is\nallowed to be empty. Instances of this type with an empty value here are\nalmost certainly wrong.\nMore info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names","type":"string"}},"type":"object","x-kubernetes-map-type":"atomic"},"type":"array"},"kubeletVolumePluginPath":{"description":"KubeletVolumePluginPath optionally specifies enablement of Calico CSI plugin. If not specified,\nCSI will be enabled by default. If set to 'None', CSI will be disabled.\nDefault: /var/lib/kubelet","type":"string"},"kubernetesProvider":{"description":"KubernetesProvider specifies a particular provider of the Kubernetes platform and enables provider-specific configuration.\nIf the specified value is empty, the Operator will attempt to automatically determine the current provider.\nIf the specified value is not empty, the Operator will still attempt auto-detection, but\nwill additionally compare the auto-detected value to the specified value to confirm they match.","enum":["","EKS","GKE","AKS","OpenShift","DockerEnterprise","RKE2","TKG","Kind"],"type":"string"},"logging":{"description":"Logging Configuration for Components","properties":{"cni":{"description":"Customized logging specification for calico-cni plugin","properties":{"logFileMaxAgeDays":{"description":"Default: 30 (days)","format":"int32","type":"integer"},"logFileMaxCount":{"description":"Default: 10","format":"int32","type":"integer"},"logFileMaxSize":{"anyOf":[{"type":"integer"},{"type":"string"}],"description":"Default: 100Mi","pattern":"^(\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\\+|-)?(([0-9]+(\\.[0-9]*)?)|(\\.[0-9]+))))?$","x-kubernetes-int-or-string":true},"logSeverity":{"description":"Default: Info","enum":["Error","Warning","Info","Debug"],"type":"string"}},"type":"object"}},"type":"object"},"nodeMetricsPort":{"description":"NodeMetricsPort specifies which port calico/node serves prometheus metrics on. By default, metrics are not enabled.\nIf specified, this overrides any FelixConfiguration resources which may exist. If omitted, then\nprometheus metrics may still be configured through FelixConfiguration.","format":"int32","type":"integer"},"nodeUpdateStrategy":{"description":"NodeUpdateStrategy can be used to customize the desired update strategy, such as the MaxUnavailable\nfield.","properties":{"rollingUpdate":{"description":"Rolling update config params. Present only if type = \"RollingUpdate\".","properties":{"maxSurge":{"anyOf":[{"type":"integer"},{"type":"string"}],"description":"The maximum number of nodes with an existing available DaemonSet pod that\ncan have an updated DaemonSet pod during during an update.\nValue can be an absolute number (ex: 5) or a percentage of desired pods (ex: 10%).\nThis can not be 0 if MaxUnavailable is 0.\nAbsolute number is calculated from percentage by rounding up to a minimum of 1.\nDefault value is 0.\nExample: when this is set to 30%, at most 30% of the total number of nodes\nthat should be running the daemon pod (i.e. status.desiredNumberScheduled)\ncan have their a new pod created before the old pod is marked as deleted.\nThe update starts by launching new pods on 30% of nodes. Once an updated\npod is available (Ready for at least minReadySeconds) the old DaemonSet pod\non that node is marked deleted. If the old pod becomes unavailable for any\nreason (Ready transitions to false, is evicted, or is drained) an updated\npod is immediatedly created on that node without considering surge limits.\nAllowing surge implies the possibility that the resources consumed by the\ndaemonset on any given node can double if the readiness check fails, and\nso resource intensive daemonsets should take into account that they may\ncause evictions during disruption.","x-kubernetes-int-or-string":true},"maxUnavailable":{"anyOf":[{"type":"integer"},{"type":"string"}],"description":"The maximum number of DaemonSet pods that can be unavailable during the\nupdate. Value can be an absolute number (ex: 5) or a percentage of total\nnumber of DaemonSet pods at the start of the update (ex: 10%). Absolute\nnumber is calculated from percentage by rounding up.\nThis cannot be 0 if MaxSurge is 0\nDefault value is 1.\nExample: when this is set to 30%, at most 30% of the total number of nodes\nthat should be running the daemon pod (i.e. status.desiredNumberScheduled)\ncan have their pods stopped for an update at any given time. The update\nstarts by stopping at most 30% of those DaemonSet pods and then brings\nup new DaemonSet pods in their place. Once the new pods are available,\nit then proceeds onto other DaemonSet pods, thus ensuring that at least\n70% of original number of DaemonSet pods are available at all times during\nthe update.","x-kubernetes-int-or-string":true}},"type":"object"},"type":{"description":"Type of daemon set update. Can be \"RollingUpdate\" or \"OnDelete\". Default is RollingUpdate.","type":"string"}},"type":"object"},"nonPrivileged":{"description":"NonPrivileged configures Calico to be run in non-privileged containers as non-root users where possible.","type":"string"},"proxy":{"description":"Proxy is used to configure the HTTP(S) proxy settings that will be applied to Tigera containers that connect\nto destinations outside the cluster. It is expected that NO_PROXY is configured such that destinations within\nthe cluster (including the API server) are exempt from proxying.","properties":{"httpProxy":{"description":"HTTPProxy defines the value of the HTTP_PROXY environment variable that will be set on Tigera containers that connect to\ndestinations outside the cluster.","type":"string"},"httpsProxy":{"description":"HTTPSProxy defines the value of the HTTPS_PROXY environment variable that will be set on Tigera containers that connect to\ndestinations outside the cluster.","type":"string"},"noProxy":{"description":"NoProxy defines the value of the NO_PROXY environment va
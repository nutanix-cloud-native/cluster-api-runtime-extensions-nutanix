agent:
  name: {{ .AgentName }}
  image:
    privateRegistry: false
pc:
  port: {{ .PrismCentralPort }}
  insecure: {{ .PrismCentralInsecure }}
  endpoint: {{ .PrismCentralHost }}
k8sClusterName: {{ .ClusterName }}
k8sDistribution: NKP
createSecret: false
{{- if .CategoryMappings }}
categoryMappings: {{ .CategoryMappings }}
{{- end }}
kubeconfigUpload:
  enabled: {{ if and .KubeconfigUploadEnabled .KubeconfigUploadControlPlaneEndpoint }}true{{ else }}false{{ end }}
  {{- if and .KubeconfigUploadEnabled .KubeconfigUploadControlPlaneEndpoint }}
  controlPlaneEndpoint: {{ .KubeconfigUploadControlPlaneEndpoint }}
  {{- end }}

cni:
  chainingMode: portmap
  exclusive: false
hubble:
  enabled: true
  tls:
    auto:
      enabled: true               # enable automatic TLS certificate generation
      method: cronJob             # auto generate certificates using cronJob method
      certValidityDuration: 60    # certificates validity duration in days (default 2 months)
      schedule: "0 0 1 * *"       # schedule on the 1st day regeneration of each month
  relay:
    enabled: true
    tls:
      server:
        enabled: true
        mtls: true
    image:
      useDigest: false
    priorityClassName: system-cluster-critical
ipam:
  mode: kubernetes
image:
  useDigest: false
operator:
  image:
    useDigest: false
certgen:
  image:
    useDigest: false
socketLB:
  hostNamespaceOnly: true
envoy:
  image:
    useDigest: false
{{- with .ControlPlane }}
{{- range $key, $val := .metadata.annotations }}
{{- if eq $key "controlplane.cluster.x-k8s.io/skip-kube-proxy" }}
# Although its safe to set k8sServiceHost in all cases,
# we're keeping it here to force a Cilium Pod rollout when enabling the kubeProxyReplacement feature.
k8sServiceHost: auto
kubeProxyReplacement: true{{ break }}
routingMode: tunnel
tunnelProtocol: geneve
loadBalancer:
  mode: dsr
  dsrDispatch: geneve
{{- end }}
{{- end }}
{{- end }}

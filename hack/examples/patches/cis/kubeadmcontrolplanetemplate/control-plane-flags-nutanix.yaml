# Nutanix-specific version using JSON patch to append to extraArgs sequence (kubeadm v1beta4 / CAPX v1.10+).
# Strategic merge patch replaces arrays; JSON patch op: add with path /-  appends individual entries.

# 1.2.15 Ensure that the --profiling argument is set to false
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraArgs/-
  value:
    name: profiling
    value: "false"

# 1.2.21 Ensure that the --service-account-lookup argument is set to true
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraArgs/-
  value:
    name: service-account-lookup
    value: "true"

# 1.2.3  Ensure that the DenyServiceExternalIPs is set
# 1.2.9  Ensure that the admission control plugin EventRateLimit is set
# 1.2.14 Ensure that the admission control plugin NodeRestriction is set
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/apiServer/extraArgs/-
  value:
    name: enable-admission-plugins
    value: DenyServiceExternalIPs,EventRateLimit,NodeRestriction

# 1.3.1 Ensure that the --terminated-pod-gc-threshold argument is set as appropriate
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/controllerManager/extraArgs/-
  value:
    name: terminated-pod-gc-threshold
    value: "10000"

# 1.3.2 Ensure that the --profiling argument is set to false
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/controllerManager/extraArgs/-
  value:
    name: profiling
    value: "false"

# 1.4.1 Ensure that the --profiling argument is set to false
- op: add
  path: /spec/template/spec/kubeadmConfigSpec/clusterConfiguration/scheduler/extraArgs/-
  value:
    name: profiling
    value: "false"

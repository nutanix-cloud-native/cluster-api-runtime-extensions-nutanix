- op: replace
  path: /stringData/credentials
  value: |
    [
      {
        "type": "api_key",
        "data": {
          "prismCentral": {
            "apiKey": "${NUTANIX_API_KEY}"
          },
          "prismElements": null
        }
      }
    ]

- op: "add"
  path: "/spec/topology/variables/0/value/addons/serviceLoadBalancer"
  value:
    provider: MetalLB
    configuration:
      addressRanges:
        - start: ${SERVICE_LOAD_BALANCER_IP_START}
          end: ${SERVICE_LOAD_BALANCER_IP_END}

---
apiVersion: v1
kind: Secret
metadata:
  name: ${CLUSTER_NAME}-flow-image-pull-secret
type: kubernetes.io/dockerconfigjson # The specific type K8s looks for
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "docker.io": {
          "username": "${NUTANIX_FLOW_DOCKER_HUB_USERNAME}",
          "password": "${NUTANIX_FLOW_DOCKER_HUB_TOKEN}"
        }
      }
    }
